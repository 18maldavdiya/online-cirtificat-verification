<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="login.css">

</head>

<body>

<div class="container">

    <!-- Left Side -->

    <div class="left">

        <img src="images/login.png" alt="Login">

    </div>

    <!-- Right Side -->

    <div class="right">

        <h1>Welcome Back 👋</h1>

        <p>

            Login to access your dashboard.

        </p>

        <form id="loginForm"></form>>

            <label>Email</label>

            <input
                type="email"
                id="email"
                placeholder="Enter the Email"
            >

            <label>Password</label>

            <input
                type="password"
                id="password"
                placeholder="Enter the Password"
            >

            <button type="submit"> 

                Login

            </button>

        </form>

        <a href="#">Forgot Password?</a>

        <br><br>

        <a href="\Frontend\LangingPage\index.html">

            ← Back to Home

        </a>

    </div>

</div>

<script src="login.js"></script>

</body>

</html>
