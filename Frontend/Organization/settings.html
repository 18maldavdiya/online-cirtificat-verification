<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organization Settings</title>
    <link rel="stylesheet" href="../Admin/admin.css">
    <link rel="stylesheet" href="organization-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <h2>CertiVerify</h2>
            <p>Organization Portal</p>
        </div>
        <ul>
            <li data-page="dashboard"><a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>
            <li data-page="issueCertificate"><a href="issueCertificate.html"><i class="fa-solid fa-file-circle-plus"></i> Issue Certificate</a></li>
            <li data-page="manageCertificates"><a href="manageCertificates.html"><i class="fa-solid fa-list-check"></i> Manage Certificates</a></li>
            <li data-page="verificationHistory"><a href="verificationHistory.html"><i class="fa-solid fa-clock-rotate-left"></i> Verification History</a></li>
            <li data-page="profile"><a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a></li>
            <li data-page="settings" class="active"><a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
            <li class="logout-item"><a href="../Login/Login.html"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
        </ul>
    </div>

    <div class="main">
        <div class="topbar">
            <div class="search">
                <input type="text" placeholder="Search settings">
            </div>
            <div class="admin-profile">
                <i class="fa-solid fa-bell"></i>
                <i class="fa-solid fa-circle-user profile-icon"></i>
                <span>Org Admin</span>
            </div>
        </div>

        <div class="content">
            <div class="page-header">
                <div>
                    <h1>Organization Settings</h1>
                    <p>Manage account preferences and organization details.</p>
                </div>
                <a href="profile.html" class="primary-btn"><i class="fa-solid fa-user"></i> View Profile</a>
            </div>

            <div class="form-card">
                <form>
                    <div class="form-grid">
                        <div>
                            <label>Organization Name</label>
                            <input type="text" value="Northstar Academy">
                        </div>
                        <div>
                            <label>Primary Contact</label>
                            <input type="text" value="Alicia Fernando">
                        </div>
                        <div>
                            <label>Email</label>
                            <input type="email" value="admin@northstar.edu">
                        </div>
                        <div>
                            <label>Notification Preference</label>
                            <select>
                                <option>Instant</option>
                                <option>Daily</option>
                                <option>Weekly</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="secondary-btn">Reset</button>
                        <button type="submit" class="primary-btn">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="organization-dashboard.js"></script>
</body>
</html>
